<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InterviewPrep AI</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind custom colors
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ipn: {
              bg: '#0b1320',        // dark navy
              slate: '#0f1724',     // slate
              indigo: '#5b21b6',    // indigo accent
              electric: '#0ea5ff',  // electric blue
              warm: '#f59e0b'
            }
          }
        }
      }
    }
  </script>

  <!-- React / ReactDOM / Babel CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html,body,#root { height:100%; }
    body {
      background: linear-gradient(180deg, #071126 0%, #0b1320 100%);
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    .card-glow {
      box-shadow: 0 6px 24px rgba(79, 70, 229, 0.12), 0 0 0 4px rgba(79,70,229,0);
      transition: box-shadow .18s, transform .12s;
    }
    .card-glow.selected {
      box-shadow: 0 10px 40px rgba(79,70,229,0.18), 0 0 30px rgba(79,70,229,0.10);
      transform: translateY(-4px);
      border-color: rgba(79,70,229,0.9);
    }
    /* Avatar animations */
    .avatar-wrap { perspective: 800px; }
    .floating { animation: floaty 6s ease-in-out infinite; }
    @keyframes floaty { 0% { transform: translateY(0) } 50% { transform: translateY(-6px) } 100% { transform: translateY(0) } }
    .blink { animation: blink 4s infinite; }
    @keyframes blink { 0%{opacity:1} 2%{opacity:0} 4%{opacity:1} 100%{opacity:1} }
    .speech-bubble { white-space: pre-wrap; }
    .typing { border-right: 2px solid rgba(255,255,255,0.08); animation: blink-caret .9s steps(1) infinite; }
    @keyframes blink-caret { 50% { border-color: transparent } }
    /* Mic pulsing */
    .mic-active { box-shadow: 0 0 0 8px rgba(239,68,68,0.12); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0% { transform: scale(1) } 50% { transform: scale(1.06) } 100% { transform: scale(1) } }
    /* confetti */
    .confetti { position: fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden; }
    .confetti-piece {
      position:absolute; width:10px; height:14px; opacity:0.9;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%{transform: translateY(-10vh) rotate(0) }
      100%{ transform: translateY(110vh) rotate(720deg); opacity:1 }
    }
    /* collapsible */
    details[open] summary::after { content: "▲"; float:right; }
    summary::after { content: "▼"; float:right; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Fallback bank: 15 questions per type
    const BANK = {
      Technical: [
        "Explain the difference between process and thread.",
        "What is a RESTful API and why is it useful?",
        "How does a hash table work? Explain collisions.",
        "Describe the lifecycle of a HTTP request in a web server.",
        "How would you optimize a slow SQL query?",
        "Explain time complexity and Big-O with examples.",
        "What is a race condition and how to prevent it?",
        "Describe how you would design a URL shortener service.",
        "Explain the difference between synchronous and asynchronous code.",
        "How does garbage collection work in managed languages?",
        "What are SQL joins and their types?",
        "Explain memoization and when to use it.",
        "Describe CAP theorem in distributed systems.",
        "How do you secure sensitive data at rest and in transit?",
        "Explain the principles of microservices vs monoliths."
      ],
      Behavioural: [
        "Tell me about a time you faced conflict on a team.",
        "Describe a challenge you overcame and how.",
        "How do you prioritize tasks when under pressure?",
        "Give an example of how you handled feedback.",
        "Tell me about a time you failed and what you learned.",
        "Describe a leadership experience.",
        "How do you handle tight deadlines?",
        "Tell me about a time you improved a process.",
        "How do you adapt to changing requirements?",
        "Describe how you mentored a colleague.",
        "How do you maintain work-life balance under pressure?",
        "Tell me about a time you disagreed with a decision.",
        "Describe how you handle ambiguity.",
        "Tell me about a time you went above and beyond.",
        "How do you build trust within a team?"
      ],
      General: [
        "Why are you interested in this role?",
        "Walk me through your resume.",
        "What are your greatest strengths?",
        "What are your biggest weaknesses?",
        "Where do you see yourself in 5 years?",
        "How do you stay current in your field?",
        "What motivates you professionally?",
        "Describe a proud career accomplishment.",
        "How do you handle constructive criticism?",
        "What do you know about our company?",
        "How do you approach problem-solving?",
        "How do you collaborate with cross-functional teams?",
        "What is your preferred work environment?",
        "Tell me about a time you learned a new skill quickly.",
        "Describe your ideal manager."
      ]
    };

    // Utility helpers
    function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
    function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
    function randChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function pickFiveFromBank(type, difficulty){
      // difficulty: Junior/Mid/Senior -> offset for selection
      const pool = BANK[type] || BANK.Technical;
      const start = difficulty === 'Junior' ? 0 : (difficulty === 'Mid' ? 3 : 6);
      // pick 5 unique
      let copy = [...pool];
      let chosen = [];
      while(chosen.length < 5 && copy.length){
        const i = Math.floor(Math.random()*copy.length);
        chosen.push(copy.splice(i,1)[0]);
      }
      return chosen;
    }

    // Main App
    function App(){
      // state shape
      const [screen, setScreen] = useState('landing');
      const [userName, setUserName] = useState('');
      const [userRole, setUserRole] = useState('');
      const [interviewType, setInterviewType] = useState('');
      const [difficulty, setDifficulty] = useState('Junior');
      const [apiKey, setApiKey] = useState('');
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [scores, setScores] = useState([]);
      const [feedback, setFeedback] = useState([]); // per-question feedback objects
      const [overallFeedback, setOverallFeedback] = useState(null);
      const [timerSeconds, setTimerSeconds] = useState(120);
      const [isListening, setIsListening] = useState(false);
      const [avatarState, setAvatarState] = useState('idle'); // idle,speaking, listening, thinking, happy, encouraging
      const [isMuted, setIsMuted] = useState(false);

      // local UI state
      const [displayedQuestion, setDisplayedQuestion] = useState('');
      const [userAnswerText, setUserAnswerText] = useState('');
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [micSupported, setMicSupported] = useState(false);
      const recognitionRef = useRef(null);
      const timerRef = useRef(null);
      const typingRef = useRef(null);
      const confettiRef = useRef(null);

      useEffect(()=>{
        // detect SpeechRecognition
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        setMicSupported(!!SR);
      },[]);

      // When question changes, reveal question, read aloud, start timer
      useEffect(()=>{
        if(screen === 'interview' && questions.length){
          const q = questions[currentIndex] || '';
          revealQuestion(q);
          speakText(q);
          startTimer();
          setUserAnswerText('');
          setAvatarState('listening');
        } else {
          stopTimer();
        }
        // cleanup on leaving interview
        return ()=> stopTimer();
      }, [screen, currentIndex, questions]);

      // Timer tick
      function startTimer(){
        setTimerSeconds(120);
        clearInterval(timerRef.current);
        timerRef.current = setInterval(()=>{
          setTimerSeconds(prev=>{
            if(prev <= 1){
              clearInterval(timerRef.current);
              handleAutoSubmit();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      }
      function stopTimer(){
        if(timerRef.current) clearInterval(timerRef.current);
      }

      function revealQuestion(text){
        setDisplayedQuestion('');
        if(typingRef.current) clearInterval(typingRef.current);
        let i = 0;
        typingRef.current = setInterval(()=>{
          i++;
          setDisplayedQuestion(text.slice(0,i));
          if(i >= text.length) {
            clearInterval(typingRef.current);
            setAvatarState('speaking');
            setTimeout(()=> setAvatarState('idle'), 700);
          }
        }, 18); // speed
      }

      function speakText(text){
        if(!window.speechSynthesis || isMuted) return;
        try {
          window.speechSynthesis.cancel();
          const ut = new SpeechSynthesisUtterance(text);
          ut.rate = 1;
          ut.pitch = 1;
          ut.lang = 'en-US';
          window.speechSynthesis.speak(ut);
        } catch(e){}
      }

      async function startInterview(){
        // validation already enforced by button enabling
        setScreen('interview');
        // generate questions: use API if apiKey present
        const qs = await generateQuestions(interviewType, difficulty, userRole);
        setQuestions(qs);
        setCurrentIndex(0);
        setAnswers([]);
        setScores([]);
        setFeedback([]);
        setOverallFeedback(null);
      }

      async function generateQuestions(type, diff, role){
        if(apiKey && apiKey.trim()){
          try {
            const prompt = `Generate 5 ${diff} ${type} interview questions for a ${role} position. Return ONLY a JSON array of 5 question strings, no markdown.`;
            const res = await callAnthropic(prompt);
            // expect response text to be JSON array
            try {
              const arr = JSON.parse(res);
              if(Array.isArray(arr) && arr.length >= 5) return arr.slice(0,5);
            } catch(e){}
          } catch(e){
            console.warn('Anthropic Qs failed, using fallback', e);
          }
        }
        // fallback pick
        return pickFiveFromBank(type, diff);
      }

      async function callAnthropic(prompt){
        // returns response content as string
        const url = 'https://api.anthropic.com/v1/messages';
        const body = {
          model: "claude-sonnet-4-20250514",
          messages: [
            { role: "user", content: prompt }
          ]
        };
        const resp = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type':'application/json',
            Authorization: `Bearer ${apiKey}`
          },
          body: JSON.stringify(body)
        });
        if(!resp.ok) throw new Error('API error '+resp.status);
        const json = await resp.json();
        // Anthropic responses vary. Try common fields
        if(json && (json.output || json.choices)){
          const out = json.output?.content?.[0]?.text ?? json.choices?.[0]?.message?.content ?? JSON.stringify(json);
          return out;
        }
        // fallback stringify
        return JSON.stringify(json);
      }

      async function handleSubmitAnswer(auto=false){
        if(isSubmitting) return;
        if(!auto && userAnswerText.trim().length < 10) return;
        setIsSubmitting(true);
        setAvatarState('thinking');
        stopTimer();

        const question = questions[currentIndex];
        const answer = userAnswerText.trim();
        // call API for scoring/feedback or fallback
        let fb;
        if(apiKey && apiKey.trim()){
          try {
            const prompt = `Score this interview answer 1-10. Question: ${question}. Answer: ${answer}. Return ONLY JSON: { score: number, good: string, improve: string, suggested: string }`;
            const raw = await callAnthropic(prompt);
            // try parse JSON from response (strip markdown if any)
            const firstBracket = raw.indexOf('{');
            const lastBracket = raw.lastIndexOf('}');
            const jsonStr = firstBracket >=0 ? raw.slice(firstBracket, lastBracket+1) : raw;
            fb = JSON.parse(jsonStr);
          } catch(e){
            console.warn('API scoring failed', e);
            fb = fallbackFeedback(question, answer);
          }
        } else {
          fb = fallbackFeedback(question, answer);
        }

        // ensure fields
        fb.score = typeof fb.score === 'number' ? clamp(Math.round(fb.score), 0, 10) : 5;
        fb.good = fb.good || 'Clear parts of your answer were strong.';
        fb.improve = fb.improve || 'Be more specific and structure your points.';
        fb.suggested = fb.suggested || 'A concise improved answer example goes here.';

        // update state arrays
        setAnswers(prev => {
          const copy = [...prev]; copy[currentIndex] = answer; return copy;
        });
        setScores(prev => {
          const copy = [...prev]; copy[currentIndex] = fb.score; return copy;
        });
        setFeedback(prev => {
          const copy = [...prev]; copy[currentIndex] = fb; return copy;
        });

        setAvatarState(fb.score >= 7 ? 'happy' : 'encouraging');

        setIsSubmitting(false);
        // small delay then either next or see results
      }

      function handleAutoSubmit(){
        // automatically submit current text (even if empty)
        if(userAnswerText.trim().length < 1){
          // create placeholder answer
          setUserAnswerText('(No answer)');
        }
        handleSubmitAnswer(true).then(()=> {
          // advance
          nextOrResults();
        });
      }

      async function nextOrResults(){
        // move to next question or show results
        const isLast = currentIndex >= questions.length-1;
        if(!isLast){
          setCurrentIndex(ci => ci + 1);
          setTimerSeconds(120);
          setAvatarState('idle');
        } else {
          // finalize: call summary API or fallback
          await finalizeResults();
          setScreen('results');
        }
      }

      async function finalizeResults(){
        // compute overall percent
        const totalScore = scores.reduce((s,v)=>s+(v||0),0);
        const count = questions.length || 1;
        const avg = Math.round((totalScore / (count*10)) * 100);
        // generate combined summary via API if apiKey present
        let summaryObj = null;
        if(apiKey && apiKey.trim()){
          try {
            const collated = questions.map((q,i)=>({
              question: q,
              answer: answers[i] || '',
              score: scores[i] || 0
            }));
            const prompt = `Based on these interview responses, return ONLY JSON: { summary: string, strengths: string[], improvements: string[], nextSteps: string[] }`;
            // include data
            const fullPrompt = prompt + "\n\n" + JSON.stringify(collated, null, 2);
            const resp = await callAnthropic(fullPrompt);
            const first = resp.indexOf('{');
            const last = resp.lastIndexOf('}');
            const jsonStr = first>=0 ? resp.slice(first,last+1) : resp;
            summaryObj = JSON.parse(jsonStr);
          } catch(e){
            console.warn('Summary API failed', e);
            summaryObj = fallbackSummary(scores, feedback, userName);
          }
        } else {
          summaryObj = fallbackSummary(scores, feedback, userName);
        }
        setOverallFeedback({
          percent: avg,
          ...summaryObj
        });
        // set avatar state based on score
        setAvatarState(avg >= 80 ? 'happy' : (avg >= 60 ? 'encouraging' : 'encouraging'));
        // confetti if >=80
        if(avg >= 80) spawnConfetti();
      }

      function fallbackFeedback(question, answer){
        // simplistic heuristics
        const len = answer.split(/\s+/).length;
        let score = clamp(Math.round((Math.min(len,120)/120)*10), 3, 9);
        if(answer.toLowerCase().includes('i led') || answer.toLowerCase().includes('i led') || answer.toLowerCase().includes('achieved')) score = Math.min(10, score+1);
        const good = `You covered ${Math.min(3, Math.floor(len/10))} clear point(s) and used relevant terms.`;
        const improve = `Be more specific with measurable outcomes; organize using STAR (Situation, Task, Action, Result).`;
        const suggested = `A concise improved answer: Start with context, describe your actions, and end with measurable results.`;
        return { score, good, improve, suggested };
      }

      function fallbackSummary(scoresArr, feedbackArr, name){
        const total = scoresArr.reduce((s,v)=>s+(v||0),0);
        const percent = Math.round((total / (scoresArr.length*10)) * 100) || 0;
        const strengths = ['Clear structure in answers', 'Relevant terminology', 'Confident tone'];
        const improvements = ['Add measurable results', 'Be more concise', 'Include concrete examples'];
        const nextSteps = ['Practice 5 mock answers using STAR', 'Record and review your responses', 'Focus on measurable impact'];
        return {
          summary: `Great effort, ${name || 'Candidate'}! You scored ${percent}%.`,
          strengths, improvements, nextSteps
        };
      }

      function spawnConfetti(){
        const container = confettiRef.current;
        if(!container) return;
        for(let i=0;i<40;i++){
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          el.style.left = Math.random()*100+'%';
          el.style.background = ['#34d399','#60a5fa','#f472b6','#f59e0b'][Math.floor(Math.random()*4)];
          el.style.animationDuration = (3 + Math.random()*3).toFixed(2) + 's';
          el.style.top = (-10 - Math.random()*10)+'vh';
          container.appendChild(el);
          setTimeout(()=> el.remove(), 7000);
        }
      }

      // Mic controls
      function toggleMic(){
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) return;
        if(isListening){
          stopListening();
        } else {
          startListening();
        }
      }
      function startListening(){
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) return;
        const rec = new SR();
        rec.lang = 'en-US';
        rec.interimResults = true;
        rec.continuous = true;
        rec.onstart = ()=> { setIsListening(true); setAvatarState('listening'); };
        rec.onend = ()=> { setIsListening(false); setAvatarState('idle'); };
        let interim = '';
        rec.onresult = (e) => {
          let final = '';
          interim = '';
          for(let i=0;i<e.results.length;i++){
            const r = e.results[i];
            if(r.isFinal) final += r[0].transcript;
            else interim += r[0].transcript;
          }
          setUserAnswerText(prev => {
            // append final only once to avoid duplication
            if(final) return prev + ' ' + final;
            return prev;
          });
        };
        rec.onerror = (e)=> {
          console.warn('SR error', e);
          setIsListening(false);
        };
        rec.start();
        recognitionRef.current = rec;
      }
      function stopListening(){
        const rec = recognitionRef.current;
        if(rec) { try{ rec.stop(); } catch(e){} recognitionRef.current = null; }
        setIsListening(false);
        setAvatarState('idle');
      }

      // Derived UI booleans
      const canStart = userName.trim().length >= 2 && userRole.trim().length >= 3 && interviewType;
      const currentQuestion = questions[currentIndex] || '';
      const canSubmit = userAnswerText.trim().length >= 10 && !isSubmitting;

      // Helper: format timer
      function formatTime(s){
        const mm = Math.floor(s/60).toString().padStart(2,'0');
        const ss = (s%60).toString().padStart(2,'0');
        return `${mm}:${ss}`;
      }

      // UI components
      return (
        <div className="min-h-screen p-6 md:p-10">
          <div className="max-w-6xl mx-auto">
            {/* Header */}
            <header className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-3xl md:text-4xl font-extrabold tracking-tight">InterviewPrep AI</h1>
                <p className="text-sm text-gray-300">Practice smarter. Interview better.</p>
              </div>
              <div className="flex gap-3 items-center">
                <button onClick={()=>{ setIsMuted(!isMuted); }} className="px-3 py-1 bg-zinc-800 rounded-md text-sm">
                  {isMuted ? 'Unmute' : 'Mute'}
                </button>
                <div className="text-xs text-gray-300">State: {screen}</div>
              </div>
            </header>

            {/* Screens */}
            {screen === 'landing' && (
              <main className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="space-y-4">
                  <div className="bg-zinc-900/40 p-6 rounded-lg">
                    <label className="block text-sm text-gray-300">Your Name</label>
                    <input value={userName} onChange={e=>setUserName(e.target.value)} placeholder="e.g., Alex" className="mt-2 w-full p-3 rounded bg-zinc-800/60 placeholder:text-gray-400" />
                    <label className="block text-sm text-gray-300 mt-4">Role You're Preparing For</label>
                    <input value={userRole} onChange={e=>setUserRole(e.target.value)} placeholder="e.g., Frontend Engineer" className="mt-2 w-full p-3 rounded bg-zinc-800/60 placeholder:text-gray-400" />
                    <label className="block text-sm text-gray-300 mt-4">Anthropic API Key (optional)</label>
                    <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-..." className="mt-2 w-full p-3 rounded bg-zinc-800/60 placeholder:text-gray-400" />
                  </div>

                  <div className="bg-zinc-900/40 p-6 rounded-lg">
                    <div className="text-sm text-gray-300 mb-3">Select Interview Type</div>
                    <div className="grid grid-cols-3 gap-3">
                      {['Technical','Behavioural','General'].map(t=>(
                        <button key={t} onClick={()=>setInterviewType(t)} className={`card-glow p-4 rounded-md text-left border ${interviewType === t ? 'selected border-indigo-500' : 'border-transparent bg-zinc-800/30'}`}>
                          <div className="font-semibold">{t}</div>
                          <div className="text-xs text-gray-300 mt-1">Pick this to focus questions on {t.toLowerCase()} topics.</div>
                        </button>
                      ))}
                    </div>

                    <div className="mt-4">
                      <div className="text-sm text-gray-300 mb-2">Difficulty</div>
                      <div className="inline-flex rounded-md overflow-hidden bg-zinc-800/30">
                        {['Junior','Mid','Senior'].map(d=>(
                          <button key={d} onClick={()=>setDifficulty(d)} className={`px-3 py-2 text-sm ${difficulty===d ? 'bg-indigo-600 text-white' : 'text-gray-200'}`}>{d}</button>
                        ))}
                      </div>
                    </div>

                    <div className="mt-4">
                      <button onClick={startInterview} disabled={!canStart} className={`px-4 py-3 rounded w-full text-sm font-semibold ${canStart ? 'bg-electric text-black' : 'bg-zinc-700/40 text-gray-400'}`}>Start Interview</button>
                    </div>
                  </div>
                </div>

                <aside className="space-y-4">
                  <div className="bg-zinc-900/40 p-6 rounded-lg">
                    <h3 className="text-lg font-semibold">Quick Tips</h3>
                    <ul className="mt-3 text-sm space-y-2 text-gray-300">
                      <li>- Use STAR for behavioural answers.</li>
                      <li>- Be concise and include outcomes.</li>
                      <li>- Use the microphone to transcribe (if supported).</li>
                    </ul>
                  </div>

                  <div className="bg-zinc-900/40 p-6 rounded-lg">
                    <h3 className="text-lg font-semibold">Ready?</h3>
                    <p className="text-sm text-gray-300 mt-2">Name (min 2), Role (min 3), and a Type are required to begin.</p>
                    <div className="mt-4 text-xs text-gray-400">This app can call the Anthropic API when you provide a key; otherwise it uses a built-in fallback bank for offline preview.</div>
                  </div>
                </aside>
              </main>
            )}

            {screen === 'interview' && (
              <main className="bg-zinc-900/30 rounded-lg p-4 md:p-6">
                <div className="md:flex md:gap-6">
                  {/* Avatar panel */}
                  <div className="md:w-2/5 avatar-wrap mb-4 md:mb-0">
                    <div className={`bg-zinc-900/40 p-6 rounded-lg h-full flex flex-col items-start gap-4 ${avatarState==='idle' ? 'floating' : ''}`}>
                      <div className="flex items-center gap-3">
                        <div className={`w-28 h-28 bg-gradient-to-br from-indigo-700 to-electric rounded-full flex items-center justify-center transform ${avatarState==='speaking' ? 'translate-y-1' : ''}`}>
                          {/* Simple face SVG */}
                          <svg width="84" height="84" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="60" cy="60" r="54" fill="#0f1724"/>
                            <g transform="translate(20,30)" fill="#fff">
                              <rect x="8" y="20" width="14" height="10" rx="4" className={avatarState==='blink' ? 'blink' : ''}/>
                              <rect x="44" y="20" width="14" height="10" rx="4" />
                            </g>
                            <g transform="translate(40,73)">
                              {/* mouth */}
                              {avatarState === 'happy' ? (
                                <path d="M-8 0 q8 12 16 0" stroke="#fff" strokeWidth="4" fill="none" strokeLinecap="round" />
                              ) : (
                                <rect x="-8" y="-2" width="16" height="4" rx="2" fill="#fff" />
                              )}
                            </g>
                          </svg>
                        </div>
                        <div>
                          <div className="font-semibold">Alex — AI Interviewer</div>
                          <div className="text-sm text-gray-300">State: {avatarState}</div>
                        </div>
                      </div>

                      <div className="w-full bg-zinc-800/40 rounded p-4">
                        <div className="text-xs text-gray-300 mb-2">Question</div>
                        <div className="speech-bubble text-sm text-white">
                          <div className={`typing`}>{displayedQuestion}</div>
                        </div>
                        {avatarState === 'thinking' && <div className="mt-2 text-xs text-gray-400">Analyzing your answer...</div>}
                      </div>

                      <div className="mt-auto text-xs text-gray-400">
                        Tip: Speak clearly for transcription. Answers are scored 1-10.
                      </div>
                    </div>
                  </div>

                  {/* Conversation panel */}
                  <div className="md:w-3/5">
                    <div className="bg-zinc-900/40 p-4 rounded-lg">
                      <div className="flex items-center justify-between mb-3">
                        <div className="text-sm">Question {currentIndex+1} of {questions.length}</div>
                        <div className="w-1/2 md:w-1/3 bg-zinc-800 rounded">
                          <div style={{width: `${((currentIndex+1)/questions.length)*100}%`}} className="h-2 bg-indigo-500 rounded"></div>
                        </div>
                      </div>

                      <div className="flex items-center gap-4 mb-3">
                        <div className="flex items-center gap-2">
                          <div className={`px-3 py-1 rounded text-sm ${timerSeconds <= 10 ? 'bg-red-600' : timerSeconds <= 30 ? 'bg-yellow-500 text-black' : 'bg-zinc-800'}`}>{formatTime(timerSeconds)}</div>
                          <div className="text-xs text-gray-300">Time left</div>
                        </div>

                        <div className="ml-auto flex items-center gap-3 text-sm">
                          <button onClick={()=>{ speakText(currentQuestion); }} className="px-2 py-1 bg-zinc-800 rounded">🔊</button>
                          {!isMuted ? <div className="text-xs text-gray-300">Sound on</div> : <div className="text-xs text-gray-500">Muted</div>}
                        </div>
                      </div>

                      <div>
                        <textarea value={userAnswerText} onChange={e=>setUserAnswerText(e.target.value)} placeholder="Type your answer or use the mic..." rows="6" className="w-full p-3 rounded bg-zinc-800/30 placeholder:text-gray-400"></textarea>
                      </div>

                      <div className="flex items-center gap-3 mt-3">
                        {micSupported && (
                          <button onClick={toggleMic} className={`px-3 py-2 rounded ${isListening ? 'bg-red-600 mic-active' : 'bg-zinc-800'}`}>{isListening ? 'Stop Mic' : 'Start Mic'}</button>
                        )}
                        <button onClick={()=>handleSubmitAnswer(false)} disabled={!canSubmit} className={`px-4 py-2 rounded ${canSubmit ? 'bg-electric text-black' : 'bg-zinc-700/40 text-gray-400'}`}>Submit Answer</button>
                        <div className="ml-auto text-xs text-gray-400">Min 10 chars to submit</div>
                      </div>

                      {/* feedback (if present) */}
                      {feedback[currentIndex] && (
                        <div className="mt-4 bg-zinc-900/20 p-3 rounded">
                          <div className="flex items-center justify-between">
                            <div className="font-semibold">Feedback — Score: {feedback[currentIndex].score}/10</div>
                            <div className="text-sm text-gray-300">Question {currentIndex+1}</div>
                          </div>
                          <div className="mt-2 grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div className="p-2 bg-zinc-800/30 rounded">
                              <div className="text-xs text-gray-300">What was good</div>
                              <div className="text-sm mt-1">{feedback[currentIndex].good}</div>
                            </div>
                            <div className="p-2 bg-zinc-800/30 rounded">
                              <div className="text-xs text-gray-300">What to improve</div>
                              <div className="text-sm mt-1">{feedback[currentIndex].improve}</div>
                            </div>
                            <div className="p-2 bg-zinc-800/30 rounded">
                              <div className="text-xs text-gray-300">Suggested better answer</div>
                              <div className="text-sm mt-1">{feedback[currentIndex].suggested}</div>
                            </div>
                          </div>

                          <div className="mt-3 flex gap-2">
                            {currentIndex < questions.length - 1 ? (
                              <button onClick={async ()=>{
                                await handleSubmitAnswer(false);
                                setCurrentIndex(ci => ci + 1);
                              }} className="px-3 py-2 bg-indigo-600 rounded">Next Question</button>
                            ) : (
                              <button onClick={async ()=>{
                                await handleSubmitAnswer(false);
                                await finalizeResults();
                                setScreen('results');
                              }} className="px-3 py-2 bg-electric text-black rounded">See My Results</button>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </main>
            )}

            {screen === 'results' && overallFeedback && (
              <main className="max-w-3xl mx-auto text-center relative">
                <div ref={confettiRef} className="confetti"></div>

                <div className="bg-zinc-900/30 p-6 rounded-lg mt-6">
                  <div className="flex items-center justify-center">
                    <div className="mr-4">
                      {/* Avatar + bubble */}
                      <div className="bg-zinc-800/40 p-4 rounded inline-block">
                        <div className="font-semibold">Alex</div>
                        <div className="text-sm text-gray-300 mt-2">Great effort, {userName || 'Candidate'}! You scored {overallFeedback.percent}%.</div>
                      </div>
                    </div>

                    <div>
                      {/* Ring chart */}
                      <svg width="140" height="140" viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="48" stroke="#0f1724" strokeWidth="12" fill="none" />
                        <circle cx="60" cy="60" r="48" stroke={overallFeedback.percent >= 80 ? '#34d399' : overallFeedback.percent >= 60 ? '#f59e0b' : '#f87171'} strokeWidth="12" fill="none"
                          strokeDasharray={`${(overallFeedback.percent/100)*2*Math.PI*48} ${2*Math.PI*48}`} transform="rotate(-90 60 60)" strokeLinecap="round" />
                        <text x="60" y="66" textAnchor="middle" fontSize="18" fill="#fff">{overallFeedback.percent}%</text>
                      </svg>
                    </div>
                  </div>

                  <div className="mt-6 text-left">
                    <h3 className="font-semibold">Per-question results</h3>
                    <div className="mt-3 space-y-2">
                      {questions.map((q,i)=>(
                        <details key={i} className="bg-zinc-800/30 p-3 rounded">
                          <summary className="flex items-center gap-3">
                            <div className="text-sm flex-1">{q}</div>
                            <div className="text-xs bg-zinc-900 px-2 py-1 rounded">{scores[i] || 0}/10</div>
                          </summary>
                          <div className="mt-2 text-sm text-gray-300">
                            <div className="font-semibold">Your answer:</div>
                            <div className="truncate mt-1">{answers[i]}</div>
                            <div className="mt-2 font-semibold">Feedback:</div>
                            <div className="mt-1">{feedback[i]?.improve || 'N/A'}</div>
                          </div>
                        </details>
                      ))}
                    </div>
                  </div>

                  <div className="mt-6 grid md:grid-cols-3 gap-4 text-left">
                    <div className="p-3 rounded bg-emerald-900/20">
                      <div className="font-semibold text-green-300">What You Did Well</div>
                      <ul className="mt-2 text-sm text-gray-300 space-y-1">
                        {(overallFeedback.strengths || []).slice(0,5).map((s,idx)=> <li key={idx}>• {s}</li>)}
                      </ul>
                    </div>
                    <div className="p-3 rounded bg-amber-900/10">
                      <div className="font-semibold text-amber-300">What You Need to Improve</div>
                      <ul className="mt-2 text-sm text-gray-300 space-y-1">
                        {(overallFeedback.improvements || []).slice(0,5).map((s,idx)=> <li key={idx}>• {s}</li>)}
                      </ul>
                    </div>
                    <div className="p-3 rounded bg-indigo-900/10">
                      <div className="font-semibold text-indigo-300">Recommended Next Steps</div>
                      <ul className="mt-2 text-sm text-gray-300 space-y-1">
                        {(overallFeedback.nextSteps || []).slice(0,5).map((s,idx)=> <li key={idx}>• {s}</li>)}
                      </ul>
                    </div>
                  </div>

                  <div className="mt-6 flex gap-3 justify-center">
                    <button onClick={()=>{
                      // Try again: reset answers/scores but keep config and start over
                      setAnswers([]); setScores([]); setFeedback([]); setScreen('interview'); setCurrentIndex(0);
                      spawnConfetti(); // harmless
                    }} className="px-4 py-2 rounded bg-zinc-800/30">Try Again</button>
                    <button onClick={()=>{
                      // New interview
                      setScreen('landing');
                      setQuestions([]); setAnswers([]); setScores([]); setFeedback([]); setOverallFeedback(null);
                    }} className="px-4 py-2 rounded bg-electric text-black">New Interview</button>
                  </div>
                </div>
              </main>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
